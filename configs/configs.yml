# configs/configs.yml
# Central configuration for the multi-user Ollama chat Gradio application
# Edit values here — no need to touch the Python code for most changes

ollama:
  host: localhost
  port: 11434
  api_base: "http://localhost:11434"   # will be overridden if host/port change

models:
  available:
    - gemma3:4b
    - gemma3:270m
    - gemma3:1b
    - qwen3:0.6b
    - qwen3:1.7b
    - qwen3:4b
    - llama3.2:1b
    - llama3.2:3b
    # - phi4:mini          # uncomment & add more as needed
    # - mistral:7b-instruct

  default: llama3.2:3b               # fallback if list is empty

  display_names:                     # optional — friendly names in UI dropdown
    gemma3:4b:      "Gemma 3 – 4B"
    gemma3:270m:    "Gemma 3 – 270M (very fast)"
    gemma3:1b:      "Gemma 3 – 1B"
    qwen3:0.6b:     "Qwen 3 – 0.6B"
    qwen3:1.7b:     "Qwen 3 – 1.7B"
    qwen3:4b:       "Qwen 3 – 4B"
    llama3.2:1b:    "Llama 3.2 – 1B"
    llama3.2:3b:    "Llama 3.2 – 3B"

generation:
  default_temperature: 0.75
  temperature:
    min: 0.0
    max: 2.0
    step: 0.05

ui:
  default_user_name_prefix: "User"
  initial_users_count: 1
  streaming_animation_delay: 0.012     # seconds — for pleasant typing feel
  max_prompt_lines: 4
  max_output_lines: 12

features:
  show_model_list_in_header: true
  enable_output_copy_button: true
  auto_scroll_output: true             # (future — needs JS if you want)